<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 1.4 - ฟอร์มสมัครสมาชิก</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:420px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  label{display:block; margin-top:12px; font-size:14px; color:#333;}
  input{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px;}
  button{margin-top:18px; width:100%; padding:10px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:15px;}
  button:hover{background:#233a6e;}
  #msg{margin-top:12px; font-size:14px; white-space:pre-line;}
  .error{color:#b00020;} .success{color:#1a7a2e;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 1.4: ฟอร์มสมัครสมาชิก</h1>
  <form id="regForm" onsubmit="return validateForm(event)">
    <label>ชื่อ-นามสกุล</label>
    <input type="text" id="name">
    <label>อีเมล</label>
    <input type="text" id="email">
    <label>เบอร์โทร</label>
    <input type="text" id="phone">
    <label>รหัสผ่าน</label>
    <input type="password" id="password">
    <button type="submit">สมัครสมาชิก</button>
  </form>
  <div id="msg"></div>
</div>

<script>
function validateForm(e){
  e.preventDefault();
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let password = document.getElementById("password").value;
  let errors = [];

  if(name === "") errors.push("กรุณากรอกชื่อ-นามสกุล");
  if(email === "" || !email.includes("@")) errors.push("กรุณากรอกอีเมลให้ถูกต้อง");
  if(phone === "" || phone.length < 9 || isNaN(phone)) errors.push("กรุณากรอกเบอร์โทร 9-10 หลัก");
  if(password.length < 6) errors.push("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");

  const msgBox = document.getElementById("msg");
  if(errors.length > 0){
    msgBox.className = "error";
    msgBox.innerText = errors.join("\n");
    return false;
  }
  msgBox.className = "success";
  msgBox.innerText = "สมัครสมาชิกสำเร็จ!";
  return true;
}
</script>
</body>
</html>
