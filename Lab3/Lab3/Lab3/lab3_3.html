<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 3.3 - คำนวณค่าไฟฟ้า</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:460px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  label{display:block; margin-top:12px; font-size:14px;}
  input{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px;}
  button{margin-top:16px; padding:10px 16px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  #result{margin-top:16px; background:#f8f9fc; padding:14px; border-radius:6px; font-size:14px;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 3.3: ฟอร์มคำนวณค่าไฟฟ้าภายในบ้าน</h1>
  <label>เลขมิเตอร์เดือนก่อนหน้า (หน่วย)</label>
  <input type="number" id="prevUnit" placeholder="เช่น 1200">
  <label>เลขมิเตอร์เดือนปัจจุบัน (หน่วย)</label>
  <input type="number" id="currentUnit" placeholder="เช่น 1350">
  <button onclick="calculateElectricity()">คำนวณ</button>
  <div id="result"></div>
</div>

<script>
function calculateElectricity() {
  let prevUnit = parseFloat(document.getElementById("prevUnit").value);
  let currentUnit = parseFloat(document.getElementById("currentUnit").value);

  if ([prevUnit, currentUnit].some(isNaN) || currentUnit < prevUnit) {
    document.getElementById("result").innerHTML = "<b style='color:#b00020'>กรุณากรอกเลขมิเตอร์ให้ถูกต้อง (ปัจจุบันต้องมากกว่าหรือเท่ากับก่อนหน้า)</b>";
    return;
  }

  let usedUnit = currentUnit - prevUnit;
  let ftRate = 0.65; // บาท / หน่วย (ตัวอย่าง)
  let energyCost = 0;

  // คำนวณค่าพลังงานตามอัตราก้าวหน้า
  if (usedUnit <= 150) {
    energyCost = usedUnit * 3.25;
  } else if (usedUnit <= 400) {
    energyCost = 150 * 3.25 + (usedUnit - 150) * 4.22;
  } else {
    energyCost = 150 * 3.25 + 250 * 4.22 + (usedUnit - 400) * 4.42;
  }

  let ftCost = usedUnit * ftRate;
  let totalBeforeVat = energyCost + ftCost;
  let vat = totalBeforeVat * 0.07;
  let total = totalBeforeVat + vat;

  document.getElementById("result").innerHTML = `
    <h4>สรุปค่าไฟฟ้า</h4>
    <p>หน่วยที่ใช้: ${usedUnit} หน่วย</p>
    <p>ค่าพลังงานไฟฟ้า: ${energyCost.toFixed(2)} บาท</p>
    <p>ค่า Ft (${ftRate} บาท/หน่วย): ${ftCost.toFixed(2)} บาท</p>
    <p>รวมก่อนภาษี: ${totalBeforeVat.toFixed(2)} บาท</p>
    <p>ภาษีมูลค่าเพิ่ม 7%: ${vat.toFixed(2)} บาท</p>
    <p><strong>รวมทั้งสิ้น: ${total.toFixed(2)} บาท</strong></p>
  `;
}
</script>
</body>
</html>
